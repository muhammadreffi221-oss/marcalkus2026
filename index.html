<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Margin Calculator Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/autonumeric@4.6.0/dist/autoNumeric.min.js"></script>
    <style>
        .sidebar { background-color: #f0f2f6; min-height: 100vh; }
        .main-content { background-color: #ffffff; }
        .metric-card { border-left: 5px solid #e6e9ef; padding-left: 15px; }
        input:focus { outline: none; border-color: #ff4b4b !important; ring: 2px #ff4b4b; }
    </style>
</head>
<body class="bg-white font-sans text-gray-800">

    <div class="flex flex-col md:flex-row">
        <div class="sidebar w-full md:w-1/4 p-6 shadow-inner">
            <h2 class="text-xl font-bold mb-6">📋 Identitas Proyek</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium">Nomor PO</label>
                    <input type="text" class="w-full p-2 border rounded bg-white">
                </div>
                <div>
                    <label class="block text-sm font-medium">Nama Sales</label>
                    <input type="text" class="w-full p-2 border rounded bg-white">
                </div>
                <div>
                    <label class="block text-sm font-medium">User / Project</label>
                    <input type="text" class="w-full p-2 border rounded bg-white">
                </div>
                <div>
                    <label class="block text-sm font-medium">Vendor Supplier</label>
                    <input type="text" class="w-full p-2 border rounded bg-white">
                </div>
            </div>
        </div>

        <div class="main-content w-full md:w-3/4 p-8">
            <h1 class="text-3xl font-bold mb-2">📊 Kalkulator Margin Proyek</h1>
            <hr class="mb-8 border-gray-300">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
                <div class="space-y-6">
                    <h3 class="text-lg font-bold mb-4">📥 Input Data Dinamis</h3>
                    
                    <div>
                        <label class="block text-sm font-medium mb-1">Nominal Anggaran (Pagu) - Inc PPN</label>
                        <input type="text" id="pagu" class="w-full p-2 border rounded text-lg font-semibold">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Biaya Kirim Penjualan</label>
                        <input type="text" id="ongkir_jual" class="w-full p-2 border rounded">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Discount (CN %)</label>
                        <input type="number" id="disc_persen" step="0.5" value="0" class="w-full p-2 border rounded">
                    </div>

                    <hr class="my-4">

                    <div>
                        <label class="block text-sm font-medium mb-1">Harga Beli Invoice (Inc PPN)</label>
                        <input type="text" id="beli" class="w-full p-2 border rounded">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Biaya Instal / Teknisi</label>
                        <input type="text" id="instal" class="w-full p-2 border rounded">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Biaya Lainnya (Survey, dll.)</label>
                        <input type="text" id="lainnya" class="w-full p-2 border rounded">
                    </div>
                </div>

                <div class="space-y-6">
                    <h3 class="text-lg font-bold mb-4 text-gray-600">📈 Profit Analysis (Excl PPN)</h3>
                    
                    <div class="metric-card bg-gray-50 p-4 rounded-lg">
                        <p class="text-sm text-gray-500">Gross Profit</p>
                        <h2 id="profit_display" class="text-3xl font-bold">Rp 0</h2>
                    </div>

                    <div class="mt-4">
                        <h3 class="text-xl font-bold">Margin: <span id="margin_display" class="text-gray-400">0.00%</span></h3>
                    </div>

                    <div class="mt-8 border rounded-lg overflow-hidden">
                        <button class="w-full p-3 bg-gray-100 text-left font-semibold flex justify-between items-center outline-none">
                            Lihat Detail Breakdown
                        </button>
                        <div class="p-4 bg-white space-y-2 text-sm text-gray-600">
                            <div class="flex justify-between"><span>DPP Penjualan:</span> <span id="d_dpp">Rp 0</span></div>
                            <div class="flex justify-between"><span>PPN Penjualan (11%):</span> <span id="d_ppn">Rp 0</span></div>
                            <div class="flex justify-between"><span>PPh 22 (1.5%):</span> <span id="d_pph">Rp 0</span></div>
                            <div class="flex justify-between"><span>Biaya Admin (0.5%):</span> <span id="d_admin">Rp 0</span></div>
                            <div class="flex justify-between"><span>Insentif Sales (1%):</span> <span id="d_insentif">Rp 0</span></div>
                            <div class="flex justify-between"><span>Discount CN (Rp):</span> <span id="d_cn_rp">Rp 0</span></div>
                            <hr>
                            <div class="flex justify-between font-bold text-gray-800"><span>Terima Nett (Real):</span> <span id="d_nett">Rp 0</span></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Konfigurasi AutoNumeric (Titik otomatis, prefix Rp)
        const opt = { digitGroupSeparator: '.', decimalCharacter: ',', decimalPlaces: 0, currencySymbol: 'Rp ' };
        const anPagu = new AutoNumeric('#pagu', opt);
        const anOngkir = new AutoNumeric('#ongkir_jual', opt);
        const anBeli = new AutoNumeric('#beli', opt);
        const anInstal = new AutoNumeric('#instal', opt);
        const anLain = new AutoNumeric('#lainnya', opt);

        function hitung() {
            // Ambil angka murni buat itungan
            const pagu = anPagu.getNumber() || 0;
            const ongkirJual = anOngkir.getNumber() || 0;
            const discP = parseFloat(document.getElementById('disc_persen').value) || 0;
            const beli = anBeli.getNumber() || 0;
            const instal = anInstal.getNumber() || 0;
            const lainnya = anLain.getNumber() || 0;

            // LOGIKA (Sesuai Python lo)
            const dppJual = pagu / 1.11;
            const ppnJual = dppJual * 0.11;
            const pph22 = dppJual * 0.015;
            const insentifSales = dppJual * 0.01;
            const biayaAdmin = pagu * 0.005;
            const discCnRp = dppJual * (discP / 100);
            
            const terimaNett = dppJual - pph22 - ongkirJual;
            const totalBiayaExcl = (beli / 1.11) + instal + lainnya + biayaAdmin;
            
            const grossProfit = dppJual - totalBiayaExcl - discCnRp - insentifSales;
            const margin = dppJual > 0 ? (grossProfit / dppJual) * 100 : 0;

            // DISPLAY HASIL
            const fmt = (v) => "Rp " + Math.round(v).toLocaleString('id-ID');
            
            document.getElementById('profit_display').innerText = fmt(grossProfit);
            const mDisp = document.getElementById('margin_display');
            mDisp.innerText = margin.toFixed(2) + "%";
            
            // Warna Dinamis
            if(margin > 15) mDisp.className = "text-green-600 font-bold text-2xl";
            else if(margin > 0) mDisp.className = "text-orange-500 font-bold text-2xl";
            else mDisp.className = "text-red-600 font-bold text-2xl";

            // Breakdown
            document.getElementById('d_dpp').innerText = fmt(dppJual);
            document.getElementById('d_ppn').innerText = fmt(ppnJual);
            document.getElementById('d_pph').innerText = fmt(pph22);
            document.getElementById('d_admin').innerText = fmt(biayaAdmin);
            document.getElementById('d_insentif').innerText = fmt(insentifSales);
            document.getElementById('d_cn_rp').innerText = fmt(discCnRp);
            document.getElementById('d_nett').innerText = fmt(terimaNett);
        }

        // Jalankan fungsi hitung setiap kali ada input
        document.querySelectorAll('input').forEach(i => {
            i.addEventListener('input', hitung);
        });
    </script>
</body>
</html>

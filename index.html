<!-- BAGIAN YANG DIUBAH HANYA DI SCRIPT (hitung function) -->
<script>
    let rows = [];
    const opt = { digitGroupSeparator: '.', decimalCharacter: ',', decimalPlaces: 2, currencySymbol: 'Rp' };
    document.getElementById('project_date').valueAsDate = new Date();

    const anOngkirJual = new AutoNumeric('#ongkir_jual', opt);
    const anOngkirBeli = new AutoNumeric('#ongkir_beli', opt);
    const anInstal = new AutoNumeric('#instal', opt);
    const anLain = new AutoNumeric('#lainnya', opt);
    const anDisc = new AutoNumeric('#disc_persen', { suffixText: ' %', maximumValue: '100', minimumValue: '0', decimalPlaces: 2, digitGroupSeparator: '' });

    function tambahBaris() {
        const id = Date.now();
        const container = document.getElementById('produk-container');
        const rowHTML = `
            <div id="row-${id}" class="row-item relative p-3 border rounded-lg bg-slate-50/50">
                <button onclick="hapusBaris(${id})" class="absolute top-1 right-2 text-slate-300 hover:text-red-500">✕</button>
                <div class="grid grid-cols-3 gap-4">
                    <div><input type="number" id="qty-${id}" value="1" oninput="hitung()" class="text-xs font-bold border rounded p-1.5 text-center"></div>
                    <div><input type="text" id="jual-${id}" oninput="hitung()"></div>
                    <div><input type="text" id="beli-${id}" oninput="hitung()"></div>
                </div>
            </div>`;
        container.insertAdjacentHTML('beforeend', rowHTML);
        new AutoNumeric(`#jual-${id}`, opt);
        new AutoNumeric(`#beli-${id}`, opt);
        rows.push(id);
        hitung();
    }

    function hapusBaris(id) {
        if (rows.length > 1) {
            document.getElementById(`row-${id}`).remove();
            rows = rows.filter(rid => rid !== id);
            hitung();
        }
    }

    function hitung() {
        let totalJualInc = 0;
        let totalBeliInc = 0;

        rows.forEach(id => {
            const qty = parseFloat(document.getElementById(`qty-${id}`).value) || 0;
            const hj = AutoNumeric.getAutoNumericElement(`#jual-${id}`).getNumber() || 0;
            const hb = AutoNumeric.getAutoNumericElement(`#beli-${id}`).getNumber() || 0;
            totalJualInc += (qty * hj);
            totalBeliInc += (qty * hb);
        });

        const oJual = anOngkirJual.getNumber() || 0;
        const oBeli = anOngkirBeli.getNumber() || 0;
        const instal = anInstal.getNumber() || 0;
        const lain = anLain.getNumber() || 0;
        const dP = anDisc.getNumber() || 0;

        if (totalJualInc === 0) return;

        // ===== PENDAPATAN =====
        const paguInc = totalJualInc + oJual;
        const dppJual = paguInc / 1.11;
        const ppnJual = paguInc - dppJual;
        const pph22 = dppJual * 0.015;

        // ===== NETT =====
        const terimaNett = dppJual - pph22 - oJual;

        // ===== DISCOUNT & FEE =====
        const discCnRp = dppJual * (dP / 100); // sesuai Excel
        const insentif = terimaNett > 0 ? terimaNett * 0.01 : 0;
        const admin = terimaNett > 0 ? terimaNett * 0.005 : 0;

        // ===== COGS =====
        const dppBeli = totalBeliInc / 1.11;
        const ppnBeli = totalBeliInc - dppBeli;

        // 🔥 PENTING: PPN BELI TIDAK MASUK COST
        const totalBiayaInc = dppBeli + oBeli + instal + lain + admin + insentif + discCnRp;
        const totalBiayaExc = totalBiayaInc;

        // ===== PROFIT =====
        const gpInc = paguInc - totalBiayaInc;
        const gpExc = dppJual - totalBiayaExc;

        const marginInc = (gpInc / paguInc) * 100;
        const marginExc = (gpExc / dppJual) * 100;

        const fmt = (v) => "Rp" + Math.round(v).toLocaleString('id-ID') + ",00";

        // ===== RENDER =====
        document.getElementById('head_margin_inc').innerText = marginInc.toFixed(2) + "%";
        document.getElementById('head_profit_inc').innerText = fmt(gpInc);

        document.getElementById('s_pagu').innerText = fmt(paguInc);
        document.getElementById('s_dpp').innerText = fmt(dppJual);
        document.getElementById('s_ppn').innerText = fmt(ppnJual);
        document.getElementById('s_pph').innerText = fmt(pph22);
        document.getElementById('s_ongkir_jual').innerText = fmt(oJual);
        document.getElementById('s_nett').innerText = fmt(terimaNett);

        document.getElementById('s_cn_rp').innerText = fmt(discCnRp);
        document.getElementById('s_insentif').innerText = fmt(insentif);

        document.getElementById('c_inv').innerText = fmt(totalBeliInc);
        document.getElementById('c_dpp_beli').innerText = fmt(dppBeli);
        document.getElementById('c_ppn_beli').innerText = fmt(ppnBeli);
        document.getElementById('c_ongkir_beli').innerText = fmt(oBeli);
        document.getElementById('c_admin').innerText = fmt(admin);

        document.getElementById('res_total_inc').innerText = fmt(totalBiayaInc);
        document.getElementById('res_total_exc').innerText = fmt(totalBiayaExc);

        document.getElementById('p_gp_exc').innerText = fmt(gpExc);
        document.getElementById('p_margin_exc').innerText = marginExc.toFixed(2) + "%";
    }

    tambahBaris();
    document.querySelectorAll('#ongkir_jual, #ongkir_beli, #instal, #lainnya, #disc_persen')
        .forEach(i => i.addEventListener('input', hitung));
</script>
